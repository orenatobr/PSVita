vita:
  ip: "192.168.1.196"
  port: 1337

paths:
  db_local: "app.db"
  db_backup: "app.db.bak"
  app_local: "app"
  psp_local: "pspemu/ISO"
  originals_dir: "originals"

badge:
  cx: 64
  cy: 64
  radius: 13
  fill: [34, 197, 94]        # green-500
  check_color: [255, 255, 255]  # white
  check_width: 2

reorder:
  items_per_page: 10
  default_title_id: "PCSA00029"  # Uncharted: Golden Abyss

  # CFW apps ordered by operational relevance.
  cfw_order:
    - VITASHELL   # VitaShell
    - PSPEMUCFW   # Adrenaline (PSP emulator)
    - AUTOPLUG2   # AutoPlugin II
    - SKGD3PL0Y   # VitaDeploy
    - SKGTLSE12   # iTLS-Enso
    - SKGB4TF1X   # batteryFixer
    - SKGYAMT01   # YAMT installer

  # Games ordered alphabetically (articles ignored), series grouped by release.
  game_order:
    - PCSE00700   # AC Chronicles (Assassin's Creed Chronicles)
    - PCSE00905   # Adventures of Mana
    - PCSE00790   # Bastion
    - PCSE00480   # Child of Light
    - PCSE01232   # CosmicStarHeroine
    - PCSE01171   # Digimon Story: Cyber Sleuth - Hacker's Memory
    - PCSE00293   # Final Fantasy X HD Remaster             [FF #1]
    - PCSE00283   # Final Fantasy X-2 HD Remaster           [FF #2]
    - PCSA00126   # God of War Collection
    - PCSA00011   # Gravity Rush
    - PCSE00547   # Grim Fandango Remastered
    - PCSE00033   # Guacamelee!
    - PCSA00080   # Jak and Daxter Collection
    - PCSE00088   # Jet Set Radio
    - PCSA00107   # Killzone Mercenary
    - PCSE00786   # Trails of Cold Steel                    [ToCS #1]
    - PCSE00896   # Trails of Cold Steel II                 [ToCS #2]
    - PCSA00017   # LittleBigPlanet
    - PCSA00133   # Ratchet & Clank Collection
    - PCSA00063   # Resistance: Burning Skies
    - PCSE00449   # Rogue Legacy
    - PCSE01337   # Romancing SaGa 3
    - PCSE00950   # Shantae: Half-Genie Hero
    - PCSE00640   # Shovel Knight
    - PCSA00096   # Sly 1: Thievius Raccoonus               [Sly #1]
    - PCSA00097   # Sly 2: Band of Thieves                  [Sly #2]
    - PCSA00098   # Sly 3: Honor Among Thieves              [Sly #3]
    - PCSA00068   # Sly 4: Thieves in Time                  [Sly #4]
    - PCSA00152   # Soul Sacrifice Delta
    - PCSA00144   # Tearaway
    - PCSE00317   # Terraria
    - PCSE01153   # Secret of Mana
    - PCSA00029   # Uncharted: Golden Abyss
    - PCSE00880   # World of Final Fantasy
    - PCSE01033   # Ys Origin                               [Ys prequel]
    - PCSE00245   # Ys: Memories of Celceta                 [Ys #2]
    - PCSE01103   # Ys VIII - Lacrimosa of DANA             [Ys #3]

sync:
  app_remote: "/ux0:/app/"
  psp_remote: "/ux0:/pspemu/ISO/"

  excludes:
    # macOS / Samba metadata artefacts excluded from every sync.
    common:
      - '^\._'
      - '^\.DS_Store$'
      - '^\.AppleDouble$'
    # Additional exclusions for the app sync only.
    app_extra:
      - '^\.Spotlight-V100$'
      - '^\.fseventsd$'
      - '^games\.md$'

  lftp_settings:
    - "set ftp:use-feat false"
    - "set ftp:use-mlsd false"
    - "set ftp:passive-mode true"
    - "set ftp:use-size false"
    - "set ftp:use-mdtm false"
    - "set ftp:use-site-utime false"
    - "set ftp:list-empty-ok true"
    - "set mirror:parallel-transfer-count 1"
